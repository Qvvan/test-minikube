name: Build and Push Docker Image

on:
  push:
    branches:
      - main        # срабатывает при пуше в main
      - 'feature/*' # и при пуше в любую feature ветку

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Скачиваем код
      - name: Checkout code
        uses: actions/checkout@v3

      # Логинимся в GitHub Container Registry
      - name: Login to ghcr.io
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Собираем и пушим образ
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Тег образа = имя ветки
          tags: ghcr.io/qvvan/test-minikube:${{ github.ref_name }}