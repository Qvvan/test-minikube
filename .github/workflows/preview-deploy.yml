name: Preview Environment Deploy

on:
  push:
    branches-ignore:
      - main

env:
  REGISTRY: ghcr.io
  APP_NAME: fastapi
  NODE_IP: 46.38.156.11  # вынесено в одно место — легко менять

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      pull-requests: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          BRANCH=$(echo "${{ github.ref_name }}" | sed 's/\//-/g' | tr '[:upper:]' '[:lower:]')
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "NAMESPACE=preview-$BRANCH" >> $GITHUB_ENV
          echo "IMAGE=${{ env.REGISTRY }}/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/${{ env.APP_NAME }}-preview:$BRANCH" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Pull cache image
        run: docker pull ${{ env.IMAGE }} || true

      - name: Build and push image
        run: |
          docker build \
            --cache-from ${{ env.IMAGE }} \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            -t ${{ env.IMAGE }} .
          docker push ${{ env.IMAGE }}

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

          # лейбл для удобной очистки
          kubectl label namespace ${{ env.NAMESPACE }} \
            preview=true \
            branch=${{ env.BRANCH }} \
            --overwrite

      - name: Deploy
        run: |
          # image pull secret
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=${{ env.REGISTRY }} \
            --docker-username=${{ github.repository_owner }} \
            --docker-password=${{ secrets.GHCR_TOKEN }} \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

          # deployment + service
          cat <<'EOF' | envsubst | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: $APP_NAME
            namespace: $NAMESPACE
            labels:
              app: $APP_NAME
              branch: $BRANCH
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: $APP_NAME
            template:
              metadata:
                labels:
                  app: $APP_NAME
                  branch: $BRANCH
              spec:
                imagePullSecrets:
                  - name: ghcr-secret
                containers:
                  - name: $APP_NAME
                    image: $IMAGE
                    ports:
                      - containerPort: 8000
                    resources:
                      requests:
                        cpu: 50m
                        memory: 64Mi
                      limits:
                        cpu: 200m
                        memory: 256Mi
                    readinessProbe:
                      httpGet:
                        path: /health
                        port: 8000
                      initialDelaySeconds: 5
                      periodSeconds: 10
                    livenessProbe:
                      httpGet:
                        path: /health
                        port: 8000
                      initialDelaySeconds: 10
                      periodSeconds: 30
                    env:
                      - name: ENVIRONMENT
                        value: preview
                      - name: BRANCH
                        value: $BRANCH
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: $APP_NAME
            namespace: $NAMESPACE
          spec:
            type: NodePort
            selector:
              app: $APP_NAME
            ports:
              - port: 8000
                targetPort: 8000
          EOF

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/${{ env.APP_NAME }} \
            -n ${{ env.NAMESPACE }} \
            --timeout=120s

      - name: Get preview URL
        id: preview
        run: |
          NODE_PORT=$(kubectl get svc ${{ env.APP_NAME }} \
            -n ${{ env.NAMESPACE }} \
            -o jsonpath='{.spec.ports[0].nodePort}')
          PREVIEW_URL="http://${{ env.NODE_IP }}:$NODE_PORT"
          echo "url=$PREVIEW_URL" >> $GITHUB_OUTPUT
          echo "## ✅ Preview deployed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌍 URL | $PREVIEW_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌿 Branch | \`${{ env.BRANCH }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Image | \`${{ env.IMAGE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏷 Namespace | \`${{ env.NAMESPACE }}\` |" >> $GITHUB_STEP_SUMMARY

      # если push связан с PR — оставляем коммент с URL
      - name: Find associated PR
        id: find_pr
        uses: jwalton/gh-find-current-pr@v1
        with:
          state: open

      - name: Comment on PR
        if: steps.find_pr.outputs.number
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ steps.find_pr.outputs.number }}
          body: |
            ## 🚀 Preview Environment Updated

            | | |
            |---|---|
            | 🌍 URL | ${{ steps.preview.outputs.url }} |
            | 📦 Image | `${{ env.IMAGE }}` |
            | 🔄 Commit | `${{ github.sha }}` |

            _Обновлено при пуше в `${{ github.ref_name }}`_